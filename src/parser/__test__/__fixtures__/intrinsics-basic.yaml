Parameters:
  EnvName:
    Type: String
  InstanceType:
    Type: String
    Default: t2.micro

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-111
    us-west-2:
      AMI: ami-222
      CidrList:
        - 10.0.0.0/16
        - 10.1.0.0/16

Resources:
  MyBucket:
    Type: AWS::S3::Bucket

  Consumer:
    Type: AWS::Custom::Thing
    Properties:
      RefToResource: !Ref MyBucket
      RefToParamWithDefault: !Ref InstanceType
      RefToParamNoDefault: !Ref EnvName
      RefToPseudo: !Ref AWS::Region
      RefToUndefined: !Ref DoesNotExist
      GetAttArrayForm:
        Fn::GetAtt: [MyBucket, Arn]
      GetAttDottedForm: !GetAtt MyBucket.Arn
      GetAttNestedAttr: !GetAtt MyBucket.Outputs.Value
      GetAttUndefinedResource: !GetAtt NoSuchResource.Arn
      JoinFullyStatic: !Join ["-", ["a", "b", "c"]]
      JoinWithReference: !Join ["-", [!Ref MyBucket, "suffix"]]
      JoinNonLiteralDelimiter: !Join [!Ref EnvName, ["a", "b"]]
      SelectStaticIntoLiteralList: !Select [1, ["a", "b", "c"]]
      SelectStaticIntoMixedList: !Select [0, [!Ref MyBucket, "b"]]
      SelectOutOfBounds: !Select [5, ["a", "b"]]
      SelectDynamicIndex: !Select [!Ref EnvName, ["a", "b"]]
      PlainNestedObject:
        Foo: bar
        Baz: 3
      PlainList:
        - x
        - y
      IntegrationJoinOfRefAndGetAtt: !Join ["-", [!Ref MyBucket, !GetAtt MyBucket.Arn]]
      SubLiteralOnly: !Sub "plain text, no placeholders"
      SubWithImplicitRef: !Sub "bucket is ${MyBucket}"
      SubWithImplicitGetAtt: !Sub "arn is ${MyBucket.Arn}"
      SubWithParamDefaultCollapses: !Sub "type is ${InstanceType}"
      SubWithTwoEmbeddedRefs: !Sub "${InstanceType}-${EnvName}"
      SubWithEscapedLiteral: !Sub "literal ${!NotAVar} end"
      SubWithSubstitutionMap: !Sub
        - "value is ${CustomVar}"
        - CustomVar: !GetAtt MyBucket.Arn
      FindInMapStatic: !FindInMap [RegionMap, us-east-1, AMI]
      FindInMapDynamicTopKey: !FindInMap [RegionMap, !Ref AWS::Region, AMI]
      FindInMapUndeclaredMap: !FindInMap [NoSuchMap, us-east-1, AMI]
      FindInMapMissingTopKey: !FindInMap [RegionMap, eu-west-1, AMI]
      FindInMapMissingSecondKey: !FindInMap [RegionMap, us-east-1, CidrList]
      FindInMapListValue: !FindInMap [RegionMap, us-west-2, CidrList]
      ImportValueLiteral: !ImportValue SomeExportName
      ImportValueJoinExpr: !ImportValue
        Fn::Join: [":", [!Ref InstanceType, "suffix"]]
      ImportValueNonStaticExpr: !ImportValue
        Fn::Join: [":", [!Ref EnvName, "suffix"]]
      GetStackOutputCall:
        Fn::GetStackOutput: [!Ref MyBucket, "network-stack", "VpcId"]
      GetAZsBareForm: !GetAZs ""
      GetAZsWithRegionRef: !GetAZs
        Ref: AWS::Region
      GetAZsWithLiteralRegion: !GetAZs us-west-2
      SelectFromGetAZsBare: !Select [0, !GetAZs ""]
      SelectFromGetAZsWithRegionRef: !Select
        - 2
        - !GetAZs
            Ref: AWS::Region
      SelectDynamicIndexFromGetAZs: !Select [!Ref EnvName, !GetAZs ""]
      SplitFullyStatic: !Split [",", "a,b,c"]
      SplitOfNonLiteralSource: !Split [",", !Ref EnvName]
      SplitWithNonLiteralDelimiter: !Split [!Ref EnvName, "a,b,c"]
      SelectFromSplit: !Select [1, !Split [",", "a,b,c"]]
