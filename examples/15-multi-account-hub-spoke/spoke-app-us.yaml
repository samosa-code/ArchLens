AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Spoke account, primary region: VPC-hosted app plus its data store.
  Part of the synthetic multi-account fixture (see SOURCE.md).
Metadata:
  ArchLens:
    account: Spoke (444455556666)
    region: us-east-1
Resources:
  AppVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
  AppSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AppVpc
      CidrBlock: 10.0.1.0/24
  AppServer:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: ami-00000000000000000
      SubnetId: !Ref AppSubnet
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
